<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDGE2 Engineering Solutions</title>
    <meta name="description" content="Quick links for EDGE2 Engineering Solutions India Private Limited — get directions or view our company brochure.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0f1a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f0f2f5;
            --text-dim: #8b95a8;
            --accent: #3b82f6;
            --accent-soft: rgba(59, 130, 246, 0.12);
            --directions-start: #22c55e;
            --directions-end: #16a34a;
            --brochure-start: #3b82f6;
            --brochure-end: #6366f1;
            --website-start: #f59e0b;
            --website-end: #ea580c;
            --whatsapp-start: #25d366;
            --whatsapp-end: #128c7e;
            --call-start: #06b6d4;
            --call-end: #0891b2;
        }

        html, body {
            min-height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
        }

        /* ── Ambient glow ── */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3), transparent 70%);
            top: -120px;
            right: -80px;
        }

        body::after {
            width: 360px;
            height: 360px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.2), transparent 70%);
            bottom: -100px;
            left: -60px;
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 28px 36px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(18px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Logo ── */
        .logo {
            max-width: 140px;
            max-height: 70px;
            width: auto;
            height: auto;
            margin: 0 auto 16px;
            display: block;
            object-fit: contain;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.4px;
            line-height: 1.35;
            margin-bottom: 24px;
        }

        /* ── Buttons ── */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.2s ease;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .btn--directions {
            background: linear-gradient(135deg, var(--directions-start), var(--directions-end));
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
        }

        .btn--directions:hover {
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.4);
        }

        .btn--brochure {
            background: linear-gradient(135deg, var(--brochure-start), var(--brochure-end));
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .btn--brochure:hover {
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
        }

        .btn--website {
            background: linear-gradient(135deg, var(--website-start), var(--website-end));
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
        }

        .btn--website:hover {
            box-shadow: 0 8px 30px rgba(245, 158, 11, 0.4);
        }

        .btn--whatsapp {
            background: linear-gradient(135deg, var(--whatsapp-start), var(--whatsapp-end));
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
        }

        .btn--whatsapp:hover {
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4);
        }

        .btn--call {
            background: linear-gradient(135deg, var(--call-start), var(--call-end));
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.3);
        }

        .btn--call:hover {
            box-shadow: 0 8px 30px rgba(6, 182, 212, 0.4);
        }

        .actions-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .actions-row .btn {
            flex: 1;
        }

        /* ── Mobile Optimization ── */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .card {
                padding: 32px 20px 28px;
                border-radius: 20px;
            }

            .logo {
                max-width: 120px;
                max-height: 60px;
                margin-bottom: 12px;
            }

            .title {
                font-size: 18px;
                margin-bottom: 20px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 14px;
                border-radius: 12px;
            }
        }
    </style>
</head>
